<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're In! — PiNG!</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0f1a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .container {
    max-width: 560px;
  }
  .kat-logo {
    margin: 0 auto 1.5rem;
    display: block;
    animation: bounce 2s ease infinite;
  }
  @keyframes kat-blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
  .kat-eyes { animation: kat-blink 4s infinite; transform-origin: center; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, #4a9cff 0%, #818cf8 50%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  p {
    font-size: 1.1rem;
    color: #94a3b8;
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }
  .highlight {
    color: #4a9cff;
    font-weight: 600;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #4a9cff 0%, #818cf8 100%);
    color: #fff;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 1rem;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .back-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(74, 156, 255, 0.3);
  }
  .confetti {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: -1;
  }
  .confetti span {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: fall linear forwards;
    opacity: 0;
  }
  @keyframes fall {
    0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }
</style>
</head>
<body>
  <div class="confetti" id="confetti"></div>
  <div class="container">
    <svg class="kat-logo" width="80" height="80" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="28" cy="44" rx="14" ry="10" fill="rgba(74,156,255,0.06)" stroke="#4a9cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 42 C6 38, 4 28, 10 24 C14 21, 16 26, 14 30" fill="none" stroke="#4a9cff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="38" cy="26" r="12" fill="rgba(74,156,255,0.06)" stroke="#4a9cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M30 16 L27 4 L35 12" fill="rgba(74,156,255,0.06)" stroke="#4a9cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M31 14 L29 7 L34 12" stroke="#a78bfa" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M44 14 L48 2 L50 12" fill="rgba(74,156,255,0.06)" stroke="#4a9cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M45 13 L47.5 5 L49 12" stroke="#a78bfa" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>
      <ellipse class="kat-eyes" cx="33" cy="25" rx="2.5" ry="3" fill="#4a9cff"/>
      <ellipse class="kat-eyes" cx="43" cy="24" rx="2.5" ry="3" fill="#4a9cff"/>
      <ellipse cx="33" cy="25.5" rx="1.2" ry="1.8" fill="#0a0f1a"/>
      <ellipse cx="43" cy="24.5" rx="1.2" ry="1.8" fill="#0a0f1a"/>
      <circle cx="34" cy="24" r="0.8" fill="#151820"/>
      <circle cx="44" cy="23" r="0.8" fill="#151820"/>
      <path d="M37.5 28.5 L38.5 28.5 L38 29.5 Z" fill="#a78bfa"/>
      <path d="M35 30.5 Q38 33, 38 30.5 Q38 33, 41 30.5" fill="none" stroke="#4a9cff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="28" y1="27" x2="20" y2="25" stroke="#555d73" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
      <line x1="28" y1="29" x2="19" y2="29" stroke="#555d73" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
      <line x1="48" y1="26" x2="56" y2="24" stroke="#555d73" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
      <line x1="48" y1="28" x2="57" y2="28" stroke="#555d73" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
      <path d="M40 38 C44 40, 50 42, 54 40 C56 39, 56 37, 54 36" fill="rgba(74,156,255,0.06)" stroke="#4a9cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 48 C20 50, 22 52, 26 52 C28 52, 29 50, 28 48" fill="rgba(74,156,255,0.06)" stroke="#4a9cff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M16 50 C14 52, 16 54, 20 54 C22 54, 23 52, 22 50" fill="rgba(74,156,255,0.06)" stroke="#4a9cff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M32 36 Q34 34, 36 36" fill="none" stroke="#4a9cff" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    </svg>
    <h1>You're on the list!</h1>
    <p>
      We'll send you a heads-up when <span class="highlight">PiNG!</span> is ready for beta.
      No spam, no fluff — just the good stuff.
    </p>
    <p style="font-size: 0.95rem;">
      In the meantime, explore the interactive demos to see what's coming.
    </p>
    <a href="index.html" class="back-link">← Back to PiNG!</a>
  </div>
  <script>
    // Simple confetti effect
    const colors = ['#4a9cff', '#818cf8', '#a78bfa', '#3ddc84', '#f5a623', '#ff5c5c'];
    const container = document.getElementById('confetti');
    for (let i = 0; i < 50; i++) {
      const span = document.createElement('span');
      span.style.left = Math.random() * 100 + '%';
      span.style.background = colors[Math.floor(Math.random() * colors.length)];
      span.style.animationDuration = (2 + Math.random() * 3) + 's';
      span.style.animationDelay = Math.random() * 2 + 's';
      span.style.width = (4 + Math.random() * 8) + 'px';
      span.style.height = (4 + Math.random() * 8) + 'px';
      container.appendChild(span);
    }
  </script>
</body>
</html>
